name: Deploy Django to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Django configuration
        run: python manage.py check --deploy --fail-level WARNING

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN:-}" ] || [ -z "${RAILWAY_PROJECT_ID:-}" ] || [ -z "${RAILWAY_ENVIRONMENT_ID:-}" ] || [ -z "${RAILWAY_SERVICE_ID:-}" ]; then
            echo "Missing required Railway secrets. Set RAILWAY_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID, and RAILWAY_SERVICE_ID."
            exit 1
          fi

          railway up \
            --ci \
            --detach \
            --json \
            --project "${RAILWAY_PROJECT_ID}" \
            --environment "${RAILWAY_ENVIRONMENT_ID}" \
            --service "${RAILWAY_SERVICE_ID}" \
            -m "GitHub Actions deploy ${GITHUB_SHA}"

          for _ in $(seq 1 60); do
            STATUS="$(
              railway deployment list --json \
                --project "${RAILWAY_PROJECT_ID}" \
                --environment "${RAILWAY_ENVIRONMENT_ID}" \
                --service "${RAILWAY_SERVICE_ID}" \
                | python -c 'import json, sys
data = json.load(sys.stdin)
if isinstance(data, list) and data:
    print(data[0].get("status", ""))
elif isinstance(data, dict):
    deployments = data.get("deployments", [])
    if deployments:
        print(deployments[0].get("status", ""))
'
            )"
            case "${STATUS}" in
              SUCCESS)
                echo "Deployment succeeded."
                exit 0
                ;;
              FAILED|CRASHED)
                echo "Deployment failed with status: ${STATUS}"
                exit 1
                ;;
              *)
                echo "Current deployment status: ${STATUS:-UNKNOWN}. Waiting..."
                sleep 10
                ;;
            esac
          done

          echo "Timed out waiting for Railway deployment to reach SUCCESS."
          exit 1
