<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX BREAKOUT SCREENER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10; --panel: #0d1117; --border: #1c2333; --border2: #242f45;
    --accent: #00e5ff; --accent2: #ff6b35; --green: #00ff88; --red: #ff3860;
    --yellow: #ffd600; --muted: #4a5568; --text: #c9d1d9; --text2: #8b949e;
    --glow: 0 0 20px rgba(0,229,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Mono',monospace; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:0;left:0;right:0;bottom:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.01) 2px,rgba(0,229,255,0.01) 4px); pointer-events:none; z-index:0; }
  .wrapper { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:0 20px 40px; }

  header { border-bottom:1px solid var(--border2); padding:24px 0 20px; display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; }
  .logo-block h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,5vw,52px); letter-spacing:0.08em; color:var(--accent); text-shadow:0 0 30px rgba(0,229,255,0.4); line-height:1; }
  .logo-block .tagline { font-size:10px; letter-spacing:0.3em; color:var(--text2); margin-top:4px; text-transform:uppercase; }
  .header-stats { display:flex; gap:24px; flex-wrap:wrap; }
  .hstat { text-align:right; }
  .hstat .val { font-size:18px; font-weight:600; color:var(--green); }
  .hstat .lbl { font-size:9px; letter-spacing:0.2em; color:var(--text2); text-transform:uppercase; }

  .api-status-bar { background:rgba(0,229,255,0.04); border:1px solid var(--border2); border-left:3px solid var(--accent); padding:10px 16px; margin:16px 0 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .api-status-left { display:flex; align-items:center; gap:12px; }
  .api-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .api-dot.live { background:var(--green); box-shadow:0 0 8px rgba(0,255,136,0.6); animation:pulse-dot 2s infinite; }
  .api-dot.error { background:var(--red); }
  @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:0.4} }
  .api-status-text { font-size:10px; color:var(--text2); letter-spacing:0.1em; }
  .api-status-text strong { color:var(--accent); }
  .fmp-badge { font-size:8px; letter-spacing:0.2em; color:var(--accent); border:1px solid rgba(0,229,255,0.3); padding:2px 6px; text-transform:uppercase; }
  .api-key-form { display:flex; align-items:center; gap:8px; }
  .api-key-input { background:var(--panel); border:1px solid var(--border2); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:10px; padding:5px 10px; width:240px; outline:none; }
  .api-key-input:focus { border-color:var(--accent); }
  .btn-sm { padding:5px 12px; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; border:1px solid var(--accent); background:transparent; color:var(--accent); transition:all 0.2s; }
  .btn-sm:hover { background:rgba(0,229,255,0.08); }

  .progress-bar-wrap { margin:10px 0 0; height:3px; background:var(--border2); display:none; }
  .progress-bar-fill { height:3px; background:var(--accent); transition:width 0.3s ease; width:0%; }

  .strategy-section { margin:28px 0 24px; background:var(--panel); border:1px solid var(--border2); border-left:3px solid var(--accent); padding:18px 22px; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; }
  .strategy-title { grid-column:1/-1; font-size:9px; letter-spacing:0.35em; color:var(--accent); text-transform:uppercase; margin-bottom:6px; }
  .criteria-pill { display:flex; align-items:flex-start; gap:10px; cursor:pointer; padding:8px; border:1px solid transparent; border-radius:2px; transition:all 0.18s ease; position:relative; }
  .criteria-pill:hover { border-color:var(--border2); background:rgba(0,229,255,0.04); box-shadow:0 0 12px rgba(0,229,255,0.08); }
  .criteria-pill:hover .pill-label { color:#33eaff; }
  .criteria-pill.customized { border-color:rgba(0,229,255,0.25); background:rgba(0,229,255,0.04); }
  .criteria-pill.customized .pill-icon { border-color:var(--accent); }
  .pill-custom-dot { position:absolute; top:6px; right:6px; width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px rgba(0,229,255,0.8); display:none; }
  .criteria-pill.customized .pill-custom-dot { display:block; }
  .pill-icon { width:28px; height:28px; border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:1px; transition:border-color 0.18s; }
  .pill-text .pill-label { font-size:10px; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; transition:color 0.18s; }
  .pill-text .pill-desc { font-size:10px; color:var(--text2); font-family:'IBM Plex Sans',sans-serif; line-height:1.4; margin-top:2px; }
  .pill-text .pill-range { font-size:9px; color:var(--accent); font-family:'IBM Plex Mono',monospace; margin-top:4px; opacity:0.8; display:none; }
  .criteria-pill.customized .pill-range { display:block; }
  .pill-click-hint { font-size:8px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; margin-top:3px; }

  /* ── CRITERIA MODAL ── */
  #criteria-modal-overlay {
    position:fixed; inset:0; z-index:8000;
    background:rgba(8,11,16,0.85);
    backdrop-filter:blur(4px);
    display:none; align-items:center; justify-content:center;
  }
  #criteria-modal-overlay.open { display:flex; }
  .criteria-modal {
    background:var(--panel);
    border:1px solid var(--border2);
    border-top:2px solid var(--accent);
    padding:28px 28px 24px;
    width:100%; max-width:440px;
    box-shadow:0 0 60px rgba(0,229,255,0.12);
    position:relative;
    animation:modal-in 0.18s ease;
  }
  @keyframes modal-in { from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)} }
  .modal-close {
    position:absolute; top:12px; right:14px;
    background:none; border:none; color:var(--text2);
    font-size:18px; cursor:pointer; line-height:1;
    transition:color 0.15s;
  }
  .modal-close:hover { color:var(--accent); }
  .modal-header { margin-bottom:20px; }
  .modal-icon { font-size:22px; margin-bottom:8px; }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.08em; color:var(--accent); line-height:1; }
  .modal-subtitle { font-size:9px; letter-spacing:0.25em; color:var(--text2); text-transform:uppercase; margin-top:3px; }
  .modal-desc { font-size:11px; color:var(--text2); font-family:'IBM Plex Sans',sans-serif; line-height:1.6; margin-bottom:20px; padding:10px; border:1px solid var(--border); }
  .modal-range-section { margin-bottom:22px; }
  .modal-range-label { font-size:9px; letter-spacing:0.25em; color:var(--text2); text-transform:uppercase; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
  .modal-range-label span { color:var(--accent); font-size:11px; font-family:'IBM Plex Mono',monospace; letter-spacing:0; }
  .dual-range-wrap { position:relative; height:36px; margin-bottom:8px; }
  .dual-range-track { position:absolute; top:50%; left:0; right:0; height:3px; background:var(--border2); transform:translateY(-50%); border-radius:2px; }
  .dual-range-fill { position:absolute; top:50%; height:3px; background:var(--accent); transform:translateY(-50%); border-radius:2px; }
  .dual-range-wrap input[type=range] {
    position:absolute; top:50%; width:100%; transform:translateY(-50%);
    -webkit-appearance:none; appearance:none;
    background:transparent; pointer-events:none;
    height:36px; margin:0;
  }
  .dual-range-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:16px; height:16px; border-radius:50%;
    background:var(--accent); border:2px solid var(--bg);
    box-shadow:0 0 8px rgba(0,229,255,0.5);
    pointer-events:all; cursor:pointer;
    transition:box-shadow 0.15s;
  }
  .dual-range-wrap input[type=range]::-webkit-slider-thumb:hover { box-shadow:0 0 14px rgba(0,229,255,0.8); }
  .dual-range-wrap input[type=range]::-moz-range-thumb {
    width:16px; height:16px; border-radius:50%;
    background:var(--accent); border:2px solid var(--bg);
    box-shadow:0 0 8px rgba(0,229,255,0.5);
    pointer-events:all; cursor:pointer;
  }
  .range-inputs-row { display:flex; gap:10px; align-items:center; }
  .range-input-group { display:flex; flex-direction:column; gap:4px; flex:1; }
  .range-input-group label { font-size:8px; letter-spacing:0.2em; color:var(--text2); text-transform:uppercase; }
  .range-input-group input[type=number] {
    background:var(--bg); border:1px solid var(--border2);
    color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:12px;
    padding:7px 10px; outline:none; width:100%;
    transition:border-color 0.15s;
  }
  .range-input-group input[type=number]:focus { border-color:var(--accent); }
  .range-sep { color:var(--muted); font-size:14px; margin-top:16px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
  .modal-btn { padding:9px 18px; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--text2); transition:all 0.15s; }
  .modal-btn:hover { border-color:var(--text2); color:var(--text); }
  .modal-btn.primary { border-color:var(--accent); color:var(--accent); }
  .modal-btn.primary:hover { background:rgba(0,229,255,0.1); box-shadow:0 0 16px rgba(0,229,255,0.2); }
  .modal-btn.reset { border-color:var(--muted); color:var(--muted); }
  .modal-btn.reset:hover { border-color:var(--red); color:var(--red); }

  .controls { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; align-items:center; }
  .ctrl-group { display:flex; flex-direction:column; gap:4px; }
  .ctrl-label { font-size:9px; letter-spacing:0.25em; color:var(--text2); text-transform:uppercase; }
  select { background:var(--panel); border:1px solid var(--border2); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:11px; padding:7px 10px; outline:none; cursor:pointer; appearance:none; -webkit-appearance:none; }
  select:focus,select:hover { border-color:var(--accent); }
  select option { background:var(--panel); }
  .btn { padding:10px 20px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; border:1px solid var(--accent); background:transparent; color:var(--accent); transition:all 0.2s; white-space:nowrap; }
  .btn:hover { background:rgba(0,229,255,0.08); box-shadow:var(--glow); }
  .btn.primary { background:var(--accent); color:var(--bg); font-weight:600; }
  .btn.primary:hover { background:#33eaff; box-shadow:0 0 25px rgba(0,229,255,0.35); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  .ticker-bar { background:rgba(0,229,255,0.05); border:1px solid rgba(0,229,255,0.15); border-left:3px solid var(--green); padding:8px 14px; margin-bottom:20px; display:flex; align-items:center; gap:10px; overflow:hidden; }
  .ticker-badge { font-size:8px; letter-spacing:0.3em; color:var(--green); border:1px solid var(--green); padding:2px 6px; flex-shrink:0; text-transform:uppercase; animation:pulse-border 2s ease-in-out infinite; }
  @keyframes pulse-border { 0%,100%{opacity:1}50%{opacity:0.4} }
  .ticker-scroll { font-size:10px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ticker-scroll span { color:var(--green); font-weight:600; }

  .grid-header { display:grid; grid-template-columns:100px 75px 85px 85px 80px 90px 70px 90px 90px 100px 1fr; gap:2px; padding:10px 14px; border-bottom:1px solid var(--border2); font-size:8px; letter-spacing:0.25em; color:var(--muted); text-transform:uppercase; }
  .stock-list { display:flex; flex-direction:column; gap:2px; }
  .stock-row { display:grid; grid-template-columns:100px 75px 85px 85px 80px 90px 70px 90px 90px 100px 1fr; gap:2px; padding:12px 14px; background:var(--panel); border:1px solid var(--border); border-left:3px solid transparent; cursor:pointer; transition:all 0.15s ease; align-items:center; }
  .stock-row:hover { border-color:var(--border2); background:#111820; }
  .stock-row.alert-high { border-left-color:var(--green); background:linear-gradient(90deg,rgba(0,255,136,0.04) 0%,var(--panel) 30%); animation:row-flash 0.5s ease; }
  .stock-row.alert-mid { border-left-color:var(--yellow); background:linear-gradient(90deg,rgba(255,214,0,0.03) 0%,var(--panel) 30%); }
  .stock-row.alert-low { border-left-color:var(--accent2); background:linear-gradient(90deg,rgba(255,107,53,0.03) 0%,var(--panel) 30%); }
  @keyframes row-flash { 0%{background:rgba(0,255,136,0.12)}100%{background:linear-gradient(90deg,rgba(0,255,136,0.04) 0%,var(--panel) 30%)} }

  .col { font-size:11px; }
  .col-ticker { font-weight:600; font-size:13px; color:var(--text); }
  .col-ticker .exch { font-size:8px; color:var(--muted); display:block; letter-spacing:0.15em; margin-top:1px; }
  .col-ticker .ticker-link { color:var(--accent); text-decoration:none; cursor:pointer; }
  .col-ticker .ticker-link:hover { color:var(--green); }
  .col-ticker .company-link { display:block; margin-top:3px; font-size:9px; color:var(--text2); font-family:'IBM Plex Sans',sans-serif; line-height:1.3; text-decoration:none; cursor:pointer; }
  .col-ticker .company-link:hover { color:var(--text); }
  .vol-cell { display:flex; flex-direction:column; gap:2px; }
  .vol-ratio { font-size:11px; font-weight:600; }
  .vol-ratio.spike { color:var(--green); }
  .vol-ratio.elevated { color:var(--yellow); }
  .vol-ratio.normal { color:var(--text2); }
  .vol-bar-bg { height:3px; background:var(--border); overflow:hidden; }
  .vol-bar-fill { height:3px; background:var(--green); transition:width 0.6s ease; }
  .vol-bar-fill.yellow { background:var(--yellow); }
  .vol-bar-fill.gray { background:var(--muted); }
  .score-val { font-size:10px; color:var(--accent); font-weight:600; }
  .score-bar-bg { height:4px; background:var(--border2); margin-top:4px; }
  .score-bar-fill { height:4px; background:var(--accent); }
  .signal-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; font-weight:600; border:1px solid; }
  .signal-badge.BREAKOUT { border-color:var(--green); color:var(--green); background:rgba(0,255,136,0.08); }
  .signal-badge.WATCH { border-color:var(--yellow); color:var(--yellow); background:rgba(255,214,0,0.06); }
  .signal-badge.BUILDING { border-color:var(--accent2); color:var(--accent2); background:rgba(255,107,53,0.06); }
  .signal-badge.QUIET { border-color:var(--muted); color:var(--muted); }
  .signal-dot { width:5px; height:5px; border-radius:50%; background:currentColor; animation:blink 1.2s ease-in-out infinite; }
  .signal-badge.QUIET .signal-dot { animation:none; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
  .mini-trend { display:flex; align-items:flex-end; gap:2px; height:28px; }
  .mini-bar { width:4px; background:var(--border2); min-height:2px; }
  .mini-bar.up { background:var(--green); }
  .mini-bar.flat { background:var(--muted); }
  .mini-bar.spike { background:var(--accent); }

  .detail-panel { background:var(--panel); border:1px solid var(--border2); border-top:2px solid var(--accent); padding:22px; margin-top:12px; display:none; }
  .detail-panel.open { display:block; }
  .chart-panel { margin-bottom:16px; border:1px solid var(--border2); background:linear-gradient(180deg, rgba(0,229,255,0.04), rgba(13,17,23,0.88)); padding:14px; }
  .chart-panel-head { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .chart-panel-label { font-size:9px; letter-spacing:0.3em; color:var(--accent); text-transform:uppercase; }
  .chart-panel-sub { font-size:9px; color:var(--text2); letter-spacing:0.08em; text-transform:uppercase; }
  .chart-frame { width:100%; height:420px; border:0; display:block; background:var(--bg); }
  .detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:18px; }
  .detail-metric { border-left:2px solid var(--border2); padding-left:10px; }
  .detail-metric .dm-label { font-size:8px; letter-spacing:0.3em; color:var(--text2); text-transform:uppercase; margin-bottom:4px; }
  .detail-metric .dm-val { font-size:16px; font-weight:600; color:var(--text); }
  .detail-metric .dm-sub { font-size:9px; color:var(--text2); margin-top:2px; font-family:'IBM Plex Sans',sans-serif; }
  .vol-steps { display:flex; gap:0; align-items:stretch; margin-top:12px; }
  .vol-step { flex:1; border:1px solid var(--border2); border-right:none; padding:12px; position:relative; }
  .vol-step:last-child { border-right:1px solid var(--border2); }
  .vol-step.active { border-color:var(--green); background:rgba(0,255,136,0.04); }
  .vol-step.building { border-color:var(--yellow); background:rgba(255,214,0,0.03); }
  .step-label { font-size:9px; letter-spacing:0.2em; color:var(--text2); text-transform:uppercase; }
  .step-ratio { font-size:22px; font-family:'Bebas Neue',sans-serif; margin:4px 0 2px; }
  .step-ratio.high { color:var(--green); } .step-ratio.med { color:var(--yellow); } .step-ratio.low { color:var(--text2); }
  .step-desc { font-size:9px; color:var(--text2); font-family:'IBM Plex Sans',sans-serif; line-height:1.4; }
  .step-arrow { position:absolute; right:-14px; top:50%; transform:translateY(-50%); color:var(--accent); font-size:12px; z-index:2; background:var(--bg); padding:2px; }

  .msg-box { padding:24px; text-align:center; font-size:11px; color:var(--text2); border:1px solid var(--border); background:var(--panel); }
  .msg-box.error { border-color:var(--red); color:var(--red); }
  .loading-row { background:var(--panel); border:1px solid var(--border); padding:14px; animation:skeleton 1.5s ease-in-out infinite; }
  @keyframes skeleton { 0%,100%{opacity:0.5}50%{opacity:1} }
  .spin { display:inline-block; animation:spin 0.9s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }

  .method-section { margin-top:32px; border-top:1px solid var(--border); padding-top:24px; }
  .method-title { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.1em; color:var(--text2); margin-bottom:18px; }
  .method-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
  .method-card { border:1px solid var(--border); padding:16px; background:var(--panel); }
  .method-card h4 { font-size:9px; letter-spacing:0.3em; color:var(--accent); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .method-card h4::after { content:''; flex:1; height:1px; background:var(--border2); }
  .method-card ul { list-style:none; display:flex; flex-direction:column; gap:6px; }
  .method-card ul li { font-size:10px; color:var(--text2); font-family:'IBM Plex Sans',sans-serif; line-height:1.5; padding-left:12px; position:relative; }
  .method-card ul li::before { content:'›'; position:absolute; left:0; color:var(--accent); }
  .method-card ul li strong { color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:9px; }
  .disclaimer { margin-top:28px; padding:12px; border:1px solid var(--border); font-size:9px; color:var(--muted); font-family:'IBM Plex Sans',sans-serif; line-height:1.6; }

  @media(max-width:900px){.grid-header,.stock-row{grid-template-columns:85px 65px 75px 75px 75px 1fr;}.col:nth-child(6),.col:nth-child(7){display:none;}}
  @media(max-width:600px){.grid-header,.stock-row{grid-template-columns:75px 60px 75px 1fr;}.col:nth-child(4),.col:nth-child(5){display:none;}}

  /* ── CRITERIA THRESHOLD MODAL ── */
  #criteria-modal {
    display:none; position:fixed; inset:0; z-index:8000;
    background:rgba(8,11,16,0.88); backdrop-filter:blur(4px);
    align-items:center; justify-content:center;
  }
  #criteria-modal.open { display:flex; }
  .criteria-modal-box {
    background:var(--panel); border:1px solid var(--border2);
    border-top:2px solid var(--accent);
    padding:28px 30px 24px; width:100%; max-width:520px;
    box-shadow:0 0 60px rgba(0,229,255,0.1);
    max-height:90vh; overflow-y:auto;
  }
  .cm-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:22px;
  }
  .cm-title {
    font-size:9px; letter-spacing:0.35em; color:var(--accent);
    text-transform:uppercase;
  }
  .cm-close {
    background:none; border:none; color:var(--text2); font-size:18px;
    cursor:pointer; line-height:1; padding:0 4px;
  }
  .cm-close:hover { color:var(--accent); }
  .cm-row {
    margin-bottom:20px; padding-bottom:20px;
    border-bottom:1px solid var(--border);
  }
  .cm-row:last-of-type { border-bottom:none; margin-bottom:0; }
  .cm-row-header {
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:10px;
  }
  .cm-row-label {
    font-size:10px; letter-spacing:0.2em; color:var(--text);
    text-transform:uppercase;
  }
  .cm-row-vals {
    font-size:10px; color:var(--accent); font-weight:600;
    letter-spacing:0.05em;
  }
  .cm-slider-wrap { display:flex; flex-direction:column; gap:8px; }
  .cm-range-row { display:flex; align-items:center; gap:10px; }
  .cm-range-lbl { font-size:9px; color:var(--text2); width:28px; text-align:right; flex-shrink:0; }
  input[type=range].cm-slider {
    flex:1; -webkit-appearance:none; appearance:none;
    height:3px; background:var(--border2); outline:none; cursor:pointer;
  }
  input[type=range].cm-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px;
    border-radius:50%; background:var(--accent);
    box-shadow:0 0 6px rgba(0,229,255,0.5); cursor:pointer;
  }
  input[type=range].cm-slider::-moz-range-thumb {
    width:14px; height:14px; border-radius:50%;
    background:var(--accent); border:none; cursor:pointer;
  }
  .cm-number-row { display:flex; gap:10px; margin-top:6px; }
  .cm-number-group { display:flex; flex-direction:column; gap:4px; flex:1; }
  .cm-number-group label { font-size:8px; letter-spacing:0.2em; color:var(--text2); text-transform:uppercase; }
  .cm-number-group input[type=number] {
    background:var(--bg); border:1px solid var(--border2);
    color:var(--text); font-family:'IBM Plex Mono',monospace;
    font-size:11px; padding:5px 8px; outline:none; width:100%;
  }
  .cm-number-group input[type=number]:focus { border-color:var(--accent); }
  .cm-active-badge {
    display:inline-block; font-size:8px; letter-spacing:0.15em;
    color:var(--green); border:1px solid var(--green);
    padding:1px 5px; margin-left:8px; vertical-align:middle;
    text-transform:uppercase;
  }
  .cm-footer {
    display:flex; gap:10px; margin-top:22px; padding-top:18px;
    border-top:1px solid var(--border);
  }
  .cm-footer .btn { flex:1; }
  .btn-criteria-indicator {
    position:relative;
  }
  .btn-criteria-indicator .active-dot {
    position:absolute; top:-4px; right:-4px;
    width:7px; height:7px; border-radius:50%;
    background:var(--green); box-shadow:0 0 6px rgba(0,255,136,0.7);
    display:none;
  }
  .btn-criteria-indicator.has-active .active-dot { display:block; }

  /* ── DATA EXPLORER ── */
  .explorer-section { margin:28px 0 24px; background:var(--panel); border:1px solid var(--border2); border-left:3px solid var(--accent2); padding:18px 22px; }
  .explorer-title { font-size:9px; letter-spacing:0.35em; color:var(--accent2); text-transform:uppercase; margin-bottom:14px; }
  .explorer-links { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; }
  .explorer-link { display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--border2); cursor:pointer; transition:all 0.18s ease; text-decoration:none; background:rgba(255,107,53,0.02); }
  .explorer-link:hover { border-color:var(--accent2); background:rgba(255,107,53,0.07); box-shadow:0 0 14px rgba(255,107,53,0.1); }
  .explorer-link .el-icon { font-size:20px; flex-shrink:0; }
  .explorer-link .el-text { display:flex; flex-direction:column; gap:3px; }
  .explorer-link .el-text strong { font-size:11px; letter-spacing:0.1em; color:var(--accent2); text-transform:uppercase; }
  .explorer-link .el-text em { font-size:10px; color:var(--text2); font-style:normal; font-family:'IBM Plex Sans',sans-serif; line-height:1.4; }

  #explorer-overlay, #history-overlay { display:none; position:fixed; inset:0; z-index:8500; background:rgba(8,11,16,0.9); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:20px; }
  #explorer-overlay.open, #history-overlay.open { display:flex; }
  table.ex-table tbody td .row-link { color:var(--accent); cursor:pointer; text-decoration:underline; }
  .explorer-box { background:var(--panel); border:1px solid var(--border2); border-top:2px solid var(--accent2); width:100%; max-width:1300px; max-height:92vh; display:flex; flex-direction:column; box-shadow:0 0 60px rgba(255,107,53,0.12); }
  .ex-header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 22px; border-bottom:1px solid var(--border2); flex-wrap:wrap; }
  .ex-title { font-size:10px; letter-spacing:0.25em; color:var(--accent2); text-transform:uppercase; }
  .ex-actions { display:flex; align-items:center; gap:8px; }
  .ex-meta { padding:8px 22px; font-size:9px; color:var(--text2); letter-spacing:0.1em; border-bottom:1px solid var(--border); }
  .ex-table-wrap { overflow:auto; padding:0; flex:1; }
  table.ex-table { width:100%; border-collapse:collapse; font-family:'IBM Plex Mono',monospace; font-size:10px; }
  table.ex-table thead th { position:sticky; top:0; background:var(--bg); color:var(--accent2); text-transform:uppercase; letter-spacing:0.1em; font-size:9px; font-weight:600; padding:10px 12px; text-align:right; white-space:nowrap; border-bottom:1px solid var(--border2); z-index:2; }
  table.ex-table thead th.left { text-align:left; }
  table.ex-table thead th.sortable { cursor:pointer; user-select:none; }
  table.ex-table thead th.sortable:hover { color:#ff8f66; background:rgba(255,107,53,0.06); }
  table.ex-table thead th.sorted { color:#ff8f66; }
  table.ex-table tbody td { padding:8px 12px; text-align:right; white-space:nowrap; border-bottom:1px solid var(--border); color:var(--text); }
  table.ex-table tbody td.left { text-align:left; }
  table.ex-table tbody tr:hover { background:rgba(255,107,53,0.05); }
  table.ex-table .rank { color:var(--muted); }
  table.ex-table .tk { color:var(--accent); font-weight:600; }
  table.ex-table .pos { color:var(--green); }
  table.ex-table .neg { color:var(--red); }
  .score-cell { display:inline-block; min-width:30px; padding:2px 6px; border-radius:2px; font-weight:600; }
  .sc-hi { color:var(--green); border:1px solid rgba(0,255,136,0.4); }
  .sc-mid { color:var(--yellow); border:1px solid rgba(255,214,0,0.4); }
  .sc-lo { color:var(--text2); border:1px solid var(--border2); }
  @media print {
    body * { visibility:hidden; }
    #explorer-overlay, #explorer-overlay * { visibility:visible; }
    #explorer-overlay { position:absolute; inset:0; background:#fff; display:block; }
    .explorer-box { max-height:none; max-width:none; border:none; box-shadow:none; }
    .ex-actions, .cm-close { display:none !important; }
    table.ex-table thead th, table.ex-table tbody td { color:#000 !important; }
  }

  /* ── LOGIN OVERLAY ── */
  #login-overlay {
    position:fixed; inset:0; z-index:9999;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center;
  }
  #login-overlay::before {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.01) 2px,rgba(0,229,255,0.01) 4px);
    pointer-events:none;
  }
  .login-box {
    position:relative; z-index:1;
    background:var(--panel);
    border:1px solid var(--border2);
    border-top:2px solid var(--accent);
    padding:40px 36px 36px;
    width:100%; max-width:380px;
    box-shadow:0 0 60px rgba(0,229,255,0.08);
  }
  .login-logo { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:0.08em; color:var(--accent); text-shadow:0 0 30px rgba(0,229,255,0.4); line-height:1; margin-bottom:4px; }
  .login-sub { font-size:9px; letter-spacing:0.3em; color:var(--text2); text-transform:uppercase; margin-bottom:32px; }
  .login-field { display:flex; flex-direction:column; gap:5px; margin-bottom:16px; }
  .login-field label { font-size:9px; letter-spacing:0.25em; color:var(--text2); text-transform:uppercase; }
  .login-field input {
    background:var(--bg); border:1px solid var(--border2);
    color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:12px;
    padding:9px 12px; outline:none; width:100%;
    transition:border-color 0.2s;
  }
  .login-field input:focus { border-color:var(--accent); }
  .login-btn {
    width:100%; margin-top:8px;
    padding:11px; font-family:'IBM Plex Mono',monospace;
    font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
    cursor:pointer; border:1px solid var(--accent);
    background:var(--accent); color:var(--bg); font-weight:600;
    transition:all 0.2s;
  }
  .login-btn:hover { background:#33eaff; box-shadow:0 0 25px rgba(0,229,255,0.35); }
  .login-error {
    font-size:10px; color:var(--red); letter-spacing:0.1em;
    margin-top:12px; display:none; text-align:center;
    border:1px solid rgba(255,56,96,0.3); padding:6px;
  }

  /* ── TOP MENU / WATCHLIST ── */
  .top-menu-wrap { position:relative; margin:10px 0 14px; display:flex; align-items:center; gap:10px; }
  .menu-btn {
    width:40px; height:34px; border:1px solid var(--border2); background:var(--panel); cursor:pointer;
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:4px;
  }
  .menu-btn span { width:18px; height:2px; background:var(--accent); display:block; }
  .menu-btn:hover { border-color:var(--accent); box-shadow:var(--glow); }
  .menu-dropdown {
    position:absolute; top:40px; left:0; min-width:200px; z-index:1200;
    background:var(--panel); border:1px solid var(--border2); display:none;
  }
  .menu-dropdown.open { display:block; }
  .menu-item {
    padding:10px 12px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--text); cursor:pointer; border-bottom:1px solid var(--border);
  }
  .menu-item:last-child { border-bottom:none; }
  .menu-item:hover { background:rgba(0,229,255,0.08); color:var(--accent); }

  .watchlist-section {
    margin:0 0 18px; background:var(--panel); border:1px solid var(--border2); border-left:3px solid var(--accent);
    padding:14px;
  }
  .watchlist-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .watchlist-title { font-size:10px; letter-spacing:0.22em; color:var(--accent); text-transform:uppercase; }
  .watchlist-form { display:flex; gap:8px; flex-wrap:wrap; }
  .watchlist-input {
    background:var(--bg); border:1px solid var(--border2); color:var(--text);
    font-family:'IBM Plex Mono',monospace; font-size:11px; padding:7px 10px; width:150px;
  }
  .watchlist-input:focus { border-color:var(--accent); outline:none; }
  .watchlist-items { display:flex; flex-wrap:wrap; gap:8px; }
  .watch-chip {
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--border2); background:rgba(0,229,255,0.03); padding:6px 8px; font-size:10px;
  }
  .watch-chip .sym { color:var(--accent); font-weight:600; letter-spacing:0.08em; }
  .watch-chip .remove {
    border:none; background:none; color:var(--red); cursor:pointer; font-size:12px; line-height:1;
  }
  .watch-empty { font-size:10px; color:var(--text2); }

  .watch-btn {
    border:1px solid var(--border2);
    background:rgba(0,229,255,0.03);
    color:var(--accent);
    padding:3px 7px;
    cursor:pointer;
    font-size:9px;
  }

  /* ── HOUSING SEARCH ── */
  .housing-section {
    margin:0 0 18px; background:var(--panel); border:1px solid var(--border2);
    border-left:3px solid #4ade80; /* green accent for housing */
    padding:0;
  }
  .housing-head {
    display:flex; justify-content:space-between; align-items:center;
    gap:10px; padding:12px 16px; border-bottom:1px solid var(--border2); flex-wrap:wrap;
  }
  .housing-title { font-size:11px; letter-spacing:0.22em; color:#4ade80; text-transform:uppercase; font-weight:600; }
  .housing-status { font-size:9px; color:var(--text2); letter-spacing:0.1em; }
  .housing-powered { font-size:9px; color:var(--text2); padding:6px 16px; border-bottom:1px solid var(--border); }

  .housing-chat-wrap { display:flex; flex-direction:column; height:420px; }
  @media(max-width:600px) { .housing-chat-wrap { height:70vh; } }

  .housing-messages {
    flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px;
    scrollbar-width:thin; scrollbar-color:var(--border2) transparent;
  }
  .housing-messages::-webkit-scrollbar { width:4px; }
  .housing-messages::-webkit-scrollbar-track { background:transparent; }
  .housing-messages::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  .hchat-msg { display:flex; max-width:85%; }
  @media(max-width:480px) { .hchat-msg { max-width:100%; } }
  .hchat-user { align-self:flex-end; flex-direction:row-reverse; }
  .hchat-assistant { align-self:flex-start; }
  .hchat-bubble {
    padding:10px 14px; font-size:11px; line-height:1.6;
    font-family:'IBM Plex Sans',sans-serif; border-radius:2px;
  }
  .hchat-user .hchat-bubble {
    background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.25);
    color:var(--text);
  }
  .hchat-assistant .hchat-bubble {
    background:rgba(74,222,128,0.07); border:1px solid rgba(74,222,128,0.2);
    color:var(--text);
  }
  .hchat-error .hchat-bubble {
    background:rgba(255,56,96,0.08); border:1px solid rgba(255,56,96,0.3);
    color:var(--red);
  }
  .hchat-meta { font-size:9px; color:var(--text2); margin-top:4px; letter-spacing:0.05em; }
  .hchat-user .hchat-meta { text-align:right; }

  .housing-input-row {
    display:flex; align-items:flex-end; gap:8px;
    padding:10px 12px; border-top:1px solid var(--border2);
  }
  .housing-input {
    flex:1; background:var(--bg); border:1px solid var(--border2);
    color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:12px;
    padding:8px 10px; resize:none; outline:none; max-height:120px;
    overflow-y:auto; line-height:1.5;
  }
  .housing-input:focus { border-color:#4ade80; }
  .housing-input::placeholder { color:var(--muted); }
  .housing-send-btn {
    width:36px; height:36px; flex-shrink:0; background:rgba(74,222,128,0.1);
    border:1px solid rgba(74,222,128,0.4); color:#4ade80;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all 0.2s;
  }
  .housing-send-btn:hover { background:rgba(74,222,128,0.2); box-shadow:0 0 12px rgba(74,222,128,0.2); }
  .housing-send-btn:disabled { opacity:0.4; cursor:not-allowed; }

  .housing-typing {
    padding:6px 16px; display:flex; align-items:center; gap:4px; height:28px;
  }
  .housing-typing span {
    width:6px; height:6px; border-radius:50%; background:#4ade80;
    animation:bounce-dot 1.2s infinite;
  }
  .housing-typing span:nth-child(2) { animation-delay:0.2s; }
  .housing-typing span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce-dot {
    0%,80%,100% { transform:scale(0.6); opacity:0.4; }
    40% { transform:scale(1); opacity:1; }
  }
</head>
<body>

<!-- ── LOGIN OVERLAY ── -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">APEX BREAKOUT</div>
    <div class="login-sub">Institutional Volume Surge Screener</div>
    <div class="login-field">
      <label for="login-user">Username</label>
      <input type="text" id="login-user" placeholder="username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">ENTER SCREENER</button>
    <div class="login-error" id="login-error">⚠ Invalid username or password.</div>
  </div>
</div>

<div class="wrapper">

  <header>
    <div class="logo-block">
      <h1>APEX BREAKOUT</h1>
      <div class="tagline">Institutional Volume Surge Screener · NDX + SP500 + Russell 1000</div>
    </div>
    <div class="header-stats">
      <div class="hstat"><div class="val" id="stat-alerts">—</div><div class="lbl">Breakouts</div></div>
      <div class="hstat"><div class="val" id="stat-watch">—</div><div class="lbl">Watch</div></div>
      <div class="hstat"><div class="val" id="stat-screened">—</div><div class="lbl">Loaded</div></div>
      <div class="hstat"><div class="val" id="stat-time" style="font-size:11px;color:var(--accent)">—</div><div class="lbl">Last Update</div></div>
    </div>
  </header>

  <div class="top-menu-wrap">
    <button class="menu-btn" id="main-menu-btn" onclick="toggleMainMenu()" aria-label="Main menu">
      <span></span><span></span><span></span>
    </button>
    <div class="menu-dropdown" id="main-menu-dropdown">
      <div class="menu-item" onclick="openMyWatchlist()">My Watchlist</div>
      <div class="menu-item" onclick="openHousingSearch()">🏠 Housing Search</div>
      <div class="menu-item" onclick="openClaudeAnalysis()">🤖 Claude Analysis</div>
    </div>
  </div>

  <div class="watchlist-section" id="watchlist-section" style="display:none;">
    <div class="watchlist-head">
      <div class="watchlist-title">My Watchlist (Global)</div>
      <form class="watchlist-form" onsubmit="addWatchlistSymbol(event)">
        <input class="watchlist-input" id="watchlist-input" type="text" placeholder="e.g. AAPL" maxlength="12" />
        <button class="btn-sm" type="submit">Add</button>
      </form>
    </div>
    <div class="watchlist-items" id="watchlist-items"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       HOUSING SEARCH SECTION
       ══════════════════════════════════════════════════════════════ -->
  <div class="housing-section" id="housing-section" style="display:none;">
    <div class="housing-head">
      <div class="housing-title">🏠 HOUSING SEARCH</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="housing-status" id="housing-status"></div>
        <button class="btn-sm" onclick="closeHousingSearch()" style="border-color:var(--text2);color:var(--text2);">✕ Close</button>
      </div>
    </div>
    <div class="housing-powered">Powered by Gemini AI · <span id="housing-mcp-badge" style="display:none;">Red Bricks MCP ·</span> Ask about properties, neighborhoods, mortgages &amp; more</div>

        <div class="hchat-msg hchat-assistant">

            👋 Hi! I'm your FAAI Housing Agent powered by Gemini AI. I can help you search for homes, understand market trends, estimate costs, and navigate the buying or renting process.<br><br>

          onkeydown="housingInputKeydown(event)"></textarea>

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>

      <div class="housing-typing" id="housing-typing" style="display:none;">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- API STATUS -->
  <div class="api-status-bar">
    <div class="api-status-left">
      <div class="api-dot" id="api-dot"></div>
      <div class="api-status-text" id="api-status-text">Connecting to Apex backend — scanning NDX + SP500 + Russell 1000…</div>
      <div class="fmp-badge">~1600 TICKERS</div>
      <div class="api-status-text" id="next-refresh-text" style="margin-left:8px;padding-left:12px;border-left:1px solid var(--border2);"></div>
    </div>
    <div class="api-key-form">
      <span style="font-size:9px;color:var(--text2);letter-spacing:0.15em;text-transform:uppercase">SERVER</span>
      <input type="text" class="api-key-input" id="api-key-input" placeholder="(auto-detected: same server)" value="">
      <button class="btn-sm" onclick="reconnect()">CONNECT</button>
    </div>
  </div>
  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>

<script>
// ── LOGIN ──
// To change credentials, edit the values below.
const USERS = {
  'admin': 'apex2025'
};

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if (USERS[u] && USERS[u] === p) {
    document.getElementById('login-overlay').style.display = 'none';
    loadAllData();
  } else {
    err.style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}

// Focus username on load
window.addEventListener('load', () => {
  document.getElementById('login-user').focus();
  updateCriteriaButtonIndicator();
  loadWatchlist();
  updateCriteriaPills();
});


// ── APP ──
// ── Backend endpoint (update if you host the server elsewhere) ───────────────
// Backend URL — reads from the input so users can point to a remote server
function getBackendURL() {
  const input = document.getElementById('api-key-input');
  return (input ? input.value.trim() : '') || window.location.origin;
}

let STOCKS = [];
let openTicker = null;
let WATCHLIST = [];

// ── CRITERIA THRESHOLDS ──
// Default ranges — a filter is only "active" when the user deviates from these.
const CRITERIA_DEFAULTS = {
  revGrowth: { min: 0,   max: 200  },
  epsGrowth: { min: 0,   max: 200  },
  volRatio:  { min: 1.0, max: 20   },
  pct52H:    { min: 0,   max: 100  },
  score:     { min: 0,   max: 100  },
};

// Live thresholds — loaded from localStorage on boot, mutated by the modal.
let criteriaThresholds = loadCriteriaFromStorage();

function loadCriteriaFromStorage() {
  try {
    const saved = localStorage.getItem('apex_criteria_thresholds');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge with defaults so new keys are always present
      const merged = {};
      for (const key of Object.keys(CRITERIA_DEFAULTS)) {
        merged[key] = { ...CRITERIA_DEFAULTS[key], ...(parsed[key] || {}) };
      }
      return merged;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(CRITERIA_DEFAULTS)); // deep clone
}

function saveCriteriaToStorage() {
  try { localStorage.setItem('apex_criteria_thresholds', JSON.stringify(criteriaThresholds)); } catch(e) {}
}

// Returns true if a given criteria key has been customised away from its default.
function isCriteriaActive(key) {
  const d = CRITERIA_DEFAULTS[key];
  const t = criteriaThresholds[key];
  return t.min !== d.min || t.max !== d.max;
}

// Returns true if ANY criteria is active (used for the button indicator dot).
function hasAnyCriteriaActive() {
  return Object.keys(CRITERIA_DEFAULTS).some(isCriteriaActive);
}

function sanitizeSymbol(raw) {
  return String(raw || '').trim().toUpperCase().replace(/[^A-Z0-9.\-]/g, '');
}

function toggleMainMenu() {
  const dd = document.getElementById('main-menu-dropdown');
  if (dd) dd.classList.toggle('open');
}

function openMyWatchlist() {
  const sec = document.getElementById('watchlist-section');
  const dd = document.getElementById('main-menu-dropdown');
  if (dd) dd.classList.remove('open');
  if (sec) {
    sec.style.display = 'block';
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  loadWatchlist();
}

document.addEventListener('click', (e) => {
  const btn = document.getElementById('main-menu-btn');
  const dd = document.getElementById('main-menu-dropdown');
  if (!btn || !dd) return;
  if (!btn.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('open');
});

async function loadWatchlist() {
  try {
    const base = getBackendURL();
    const res = await fetch(`${base}/api/watchlist`);
    const data = await res.json();
    WATCHLIST = Array.isArray(data.items) ? data.items : [];
    renderWatchlist();
  } catch (e) {
    renderWatchlist('Failed to load watchlist.');
  }
}

function renderWatchlist(errMsg) {
  const wrap = document.getElementById('watchlist-items');
  if (!wrap) return;

  if (errMsg) {
    wrap.innerHTML = `<div class="watch-empty">${errMsg}</div>`;
    return;
  }

  if (!WATCHLIST.length) {
    wrap.innerHTML = '<div class="watch-empty">No symbols yet. Add your first stock.</div>';
    return;
  }

  wrap.innerHTML = WATCHLIST.map((w) => {
    const sym = w.symbol || '';
    return `<div class="watch-chip">
      <span class="sym">${sym}</span>
      <button class="remove" onclick="removeWatchlistSymbol('${sym}')">×</button>
    </div>`;
  }).join('');
}

async function addWatchlistSymbol(event) {
  event.preventDefault();
  const input = document.getElementById('watchlist-input');
  const symbol = sanitizeSymbol(input?.value);
  if (!symbol) return;

  try {
    const base = getBackendURL();
    const res = await fetch(`${base}/api/watchlist`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol })
    });
    if (!res.ok) throw new Error('add failed');
    input.value = '';
    await loadWatchlist();
  } catch (e) {
    alert('Failed to add symbol to watchlist.');
  }
}

async function removeWatchlistSymbol(symbol) {
  try {
    const base = getBackendURL();
    const res = await fetch(`${base}/api/watchlist/${encodeURIComponent(symbol)}`, {
      method: 'DELETE'
    });
    if (!res.ok) throw new Error('remove failed');
    await loadWatchlist();
  } catch (e) {
    alert('Failed to remove symbol from watchlist.');
  }
}

// Friendly labels for the modal title when scoped to a single criteria.
const CRITERIA_LABELS = {
  revGrowth: 'Revenue Growth',
  epsGrowth: 'EPS Growth',
  volRatio:  'Vol Surge Ratio',
  pct52H:    '52W High %',
  score:     'Breakout Score',
};

// ── Modal open / close ──
// When `focusKey` is provided, only that criteria's row is shown. When omitted
// (e.g. the ⚙ CRITERIA button), all rows are shown.
function openCriteriaModal(focusKey) {
  // Populate inputs from current thresholds and show/hide each row.
  for (const key of Object.keys(CRITERIA_DEFAULTS)) {
    const t = criteriaThresholds[key];
    document.getElementById(`sl-${key}-min`).value  = t.min;
    document.getElementById(`sl-${key}-max`).value  = t.max;
    document.getElementById(`num-${key}-min`).value = t.min;
    document.getElementById(`num-${key}-max`).value = t.max;
    updateCriteriaDisplay(key);
    const row = document.getElementById(`cm-row-${key}`);
    if (row) row.style.display = (!focusKey || key === focusKey) ? '' : 'none';
  }
  // Update the modal title to reflect the scope.
  const title = document.getElementById('cm-title');
  if (title) {
    title.textContent = focusKey
      ? `▸ ${CRITERIA_LABELS[focusKey] || 'Criteria'} — Set Filter Range`
      : '▸ Criteria Thresholds — Customize Filters';
  }
  document.getElementById('criteria-modal').classList.add('open');
}

function closeCriteriaModal() {
  document.getElementById('criteria-modal').classList.remove('open');
}

function handleModalBackdrop(e) {
  if (e.target === document.getElementById('criteria-modal')) closeCriteriaModal();
}

// Called by slider oninput — syncs number inputs and display label.
function syncCriteria(key) {
  const minVal = parseFloat(document.getElementById(`sl-${key}-min`).value);
  const maxVal = parseFloat(document.getElementById(`sl-${key}-max`).value);
  document.getElementById(`num-${key}-min`).value = minVal;
  document.getElementById(`num-${key}-max`).value = maxVal;
  updateCriteriaDisplay(key);
}

// Called by number input oninput — syncs sliders and display label.
function syncCriteriaFromNum(key) {
  const minVal = parseFloat(document.getElementById(`num-${key}-min`).value) || 0;
  const maxVal = parseFloat(document.getElementById(`num-${key}-max`).value) || 0;
  document.getElementById(`sl-${key}-min`).value = minVal;
  document.getElementById(`sl-${key}-max`).value = maxVal;
  updateCriteriaDisplay(key);
}

// Updates the live value label and ACTIVE badge inside the modal row.
function updateCriteriaDisplay(key) {
  const minVal = parseFloat(document.getElementById(`num-${key}-min`).value);
  const maxVal = parseFloat(document.getElementById(`num-${key}-max`).value);
  const d = CRITERIA_DEFAULTS[key];
  const isActive = minVal !== d.min || maxVal !== d.max;
  const suffix = (key === 'volRatio') ? '×' : (key === 'score') ? '' : '%';
  document.getElementById(`vals-${key}`).textContent = `Min: ${minVal}${suffix} · Max: ${maxVal}${suffix}`;
  const badge = document.getElementById(`badge-${key}`);
  badge.style.display = isActive ? 'inline-block' : 'none';
}

function formatCriteriaRangeLabel(key, min, max) {
  const suffix = (key === 'volRatio') ? '×' : (key === 'score') ? '' : '%';
  if (min === CRITERIA_DEFAULTS[key].min && max === CRITERIA_DEFAULTS[key].max) {
    return 'Default';
  }
  return `${min}${suffix} → ${max}${suffix}`;
}

function updateCriteriaPills() {
  for (const key of Object.keys(CRITERIA_DEFAULTS)) {
    const t = criteriaThresholds[key];
    const pill = document.getElementById(`pill-${key}`);
    const range = document.getElementById(`pill-range-${key}`);
    const active = isCriteriaActive(key);
    if (pill) pill.classList.toggle('customized', active);
    if (range) range.textContent = formatCriteriaRangeLabel(key, t.min, t.max);
  }
  updateCriteriaButtonIndicator();
}

// Reads modal inputs → writes to criteriaThresholds → saves → closes → filters.
function applyCriteriaAndClose() {
  for (const key of Object.keys(CRITERIA_DEFAULTS)) {
    let min = parseFloat(document.getElementById(`num-${key}-min`).value);
    let max = parseFloat(document.getElementById(`num-${key}-max`).value);
    if (!Number.isFinite(min)) min = CRITERIA_DEFAULTS[key].min;
    if (!Number.isFinite(max)) max = CRITERIA_DEFAULTS[key].max;
    if (min > max) [min, max] = [max, min];
    criteriaThresholds[key] = { min, max };
  }
  saveCriteriaToStorage();
  updateCriteriaPills();
  closeCriteriaModal();
  applyFilters();
}

// Resets all thresholds to defaults, saves, and re-renders.
function resetCriteriaDefaults() {
  criteriaThresholds = JSON.parse(JSON.stringify(CRITERIA_DEFAULTS));
  saveCriteriaToStorage();
  // Refresh modal inputs
  for (const key of Object.keys(CRITERIA_DEFAULTS)) {
    const d = CRITERIA_DEFAULTS[key];
    document.getElementById(`sl-${key}-min`).value  = d.min;
    document.getElementById(`sl-${key}-max`).value  = d.max;
    document.getElementById(`num-${key}-min`).value = d.min;
    document.getElementById(`num-${key}-max`).value = d.max;
    updateCriteriaDisplay(key);
  }
  updateCriteriaPills();
}

// Shows/hides the green dot on the ⚙ CRITERIA button.
function updateCriteriaButtonIndicator() {
  const wrap = document.getElementById('criteria-btn-wrap');
  if (hasAnyCriteriaActive()) {
    wrap.classList.add('has-active');
  } else {
    wrap.classList.remove('has-active');
  }
}


function setStatus(state, msg) {
  const dot = document.getElementById('api-dot');
  const txt = document.getElementById('api-status-text');
  dot.className = 'api-dot' + (state==='live'?' live':state==='error'?' error':'');
  txt.innerHTML = msg;
}

function setProgress(pct) {
  const wrap = document.getElementById('progress-wrap');
  const fill = document.getElementById('progress-fill');
  wrap.style.display = pct >= 100 ? 'none' : 'block';
  fill.style.width = pct + '%';
}

// Animate the progress bar while the backend is working (indeterminate)
let _progressTimer = null;
function startProgressPulse() {
  let p = 5;
  setProgress(p);
  _progressTimer = setInterval(() => {
    // Slow crawl that never quite reaches 100 until we cancel it
    p = p < 85 ? p + (Math.random() * 3) : p + 0.2;
    setProgress(Math.min(p, 92));
  }, 800);
}
function stopProgressPulse() {
  if (_progressTimer) { clearInterval(_progressTimer); _progressTimer = null; }
  setProgress(100);
}

async function loadAllData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> SCANNING…';
  setStatus('connecting', `Scanning <strong>NDX + SP500 + Russell 1000</strong> via <strong>${getBackendURL()}</strong>…`);
  startProgressPulse();

  document.getElementById('stock-list').innerHTML =
    Array(6).fill('<div class="loading-row" style="height:52px;margin-bottom:2px"></div>').join('');

  try {
    const res = await fetch(`${getBackendURL()}/api/screener-refresh`);
    if (!res.ok) throw new Error(`Server returned HTTP ${res.status}`);
    const payload = await res.json();

    if (payload.error) throw new Error(payload.error);
    STOCKS = Array.isArray(payload.stocks) ? payload.stocks : [];
    if (STOCKS.length === 0) throw new Error('No qualifying stocks returned from backend.');

    stopProgressPulse();
    const t = payload.lastUpdated || new Date().toLocaleTimeString();
    const total = payload.total || '~1 600';
    setStatus('live', `<strong>${STOCKS.length} qualifying stocks</strong> found across ${total}-stock universe (NDX + SP500 + RUT) · Updated ${t}`);
    document.getElementById('stat-time').textContent = t;
    applyFilters();

  } catch(err) {
    stopProgressPulse();
    setStatus('error', `⚠ Backend error: <strong>${err.message}</strong> — ensure the Railway deployment is live and the URL is correct`);
    document.getElementById('stock-list').innerHTML =
      `<div class="msg-box error">⚠ ${err.message}<br><span style="font-size:9px;color:var(--muted)">Check that your Railway deployment is running, then click REFRESH SCREEN.</span></div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '⟳ REFRESH SCREEN';
}

function getSignal(s) {
  const vr = Number.isFinite(s.volRatio) ? s.volRatio : 0;
  if (vr >= 3.0 && s.pct52H >= 85) return 'BREAKOUT';
  if (vr >= 2.0 || (vr >= 1.5 && s.pct52H >= 80)) return 'WATCH';
  if (vr >= 1.3) return 'BUILDING';
  return 'QUIET';
}

function fmtCap(v) {
  if (!v) return '—';
  if (v >= 1e12) return '$'+(v/1e12).toFixed(1)+'T';
  if (v >= 1e9)  return '$'+(v/1e9).toFixed(1)+'B';
  return '$'+(v/1e6).toFixed(0)+'M';
}
function fmtVol(v) {
  if (!v) return '—';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return String(v);
}

function sparkBars(s) {
  const seed = s.ticker.charCodeAt(0) + (s.ticker.charCodeAt(1)||0);
  const vr = Number.isFinite(s.volRatio) ? s.volRatio : 0;
  return Array.from({length:12},(_,i) => {
    const h = 6 + Math.abs(Math.sin(seed+i*1.7)*16 + Math.cos(i*0.9+seed*0.1)*6);
    const cls = i<8?'flat':(i===11&&vr>2?'spike':'up');
    return `<div class="mini-bar ${cls}" style="height:${Math.round(h)}px"></div>`;
  }).join('');
}

function stockChartEmbedUrl(s) {
  const exchange = (s.exchange || '').toUpperCase().replace(/\s+/g, '');
  const chartableExchanges = new Set(['NASDAQ', 'NYSE', 'AMEX', 'NYSEARCA', 'NYSEMKT', 'OTC']);
  const symbol = chartableExchanges.has(exchange) ? `${exchange}:${s.ticker}` : s.ticker;
  const params = new URLSearchParams({
    symbol,
    interval: 'D',
    hide_side_toolbar: '1',
    allow_symbol_change: '1',
    save_image: '0',
    theme: 'dark',
    style: '1',
    locale: 'en'
  });
  return `https://s.tradingview.com/widgetembed/?${params.toString()}`;
}

function toggleDetail(ticker) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const s = STOCKS.find(x => x.ticker === ticker);
  if (!s) return;
  if (openTicker === ticker) { panel.classList.remove('open'); openTicker = null; }
  else {
    content.innerHTML = renderDetail(s);
    panel.classList.add('open');
    openTicker = ticker;
    setTimeout(() => panel.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
  }
}

function applyFilters() {
  const idx   = document.getElementById('filter-index').value;
  const sig   = document.getElementById('filter-signal').value;
  const sec   = document.getElementById('filter-sector').value;
  const minSc = parseInt(document.getElementById('filter-score').value);
  const sort  = document.getElementById('sort-by').value;

  const criteriaFilters = Object.keys(CRITERIA_DEFAULTS)
    .filter(key => isCriteriaActive(key))
    .map(key => ({ key, min: criteriaThresholds[key].min, max: criteriaThresholds[key].max }));

  let data = STOCKS.filter(s => {
    const signal = getSignal(s);
    const secMatch = sec==='ALL' || (s.sector||'').toLowerCase().includes(sec.toLowerCase());

    // Standard dropdown filters
    if (!(idx==='ALL' || s.index===idx)) return false;
    if (!(sig==='ALL' || signal===sig))  return false;
    if (!secMatch)                        return false;
    if (s.score < minSc)                  return false;

    // Criteria threshold filters — only applied when the user has customised them.
    for (const f of criteriaFilters) {
      const val = s[f.key];
      // If the value is null/undefined and the user set a minimum above 0,
      // exclude the stock — unknown data doesn't satisfy a positive threshold.
      if (val == null) {
        if (f.min > 0) return false;
        // If min is 0 (or negative), pass through — don't penalise missing data.
        continue;
      }
      // Strict range check: stock must fall within [min, max].
      if (val < f.min || val > f.max) return false;
    }

    return true;
  });

  data.sort((a,b) => {
    if (sort==='score')     return b.score - a.score;
    if (sort==='volRatio')  return (b.volRatio||0) - (a.volRatio||0);
    if (sort==='change')    return b.change - a.change;
    if (sort==='revGrowth') return (b.revGrowth||0) - (a.revGrowth||0);
    return 0;
  });

  document.getElementById('stock-list').innerHTML =
    data.length ? data.map(renderRow).join('') : '<div class="msg-box">No stocks match the current filters.</div>';

  const alerts = data.filter(s=>getSignal(s)==='BREAKOUT').length;
  const watch  = data.filter(s=>getSignal(s)==='WATCH').length;
  document.getElementById('stat-alerts').textContent = alerts;
  document.getElementById('stat-watch').textContent  = watch;
  document.getElementById('stat-screened').textContent = STOCKS.length;

  const bo = data.filter(s=>getSignal(s)==='BREAKOUT').sort((a,b)=>b.score-a.score);
  document.getElementById('alert-ticker').innerHTML = bo.length
    ? bo.map(s=>`<span>${s.ticker}</span> surge ${Number.isFinite(s.volRatio)?s.volRatio:'—'}× · ${s.pct52H}% of 52W high · Score <span>${s.score}</span>`).join(' &nbsp;·&nbsp; ')
    : `Monitoring ${STOCKS.length} symbols via FMP /stable/ — no cascade breakouts currently active.`;
}


function exportCSV() {
  if (!STOCKS.length) { alert('No data loaded. Click REFRESH SCREEN first.'); return; }
  const hdr = 'Ticker,Company,Sector,Exchange,Index,Price,Change%,MarketCap,RevGrowth%,EpsGrowth%,VolRatio,Volume,AvgVolume,52WHigh%,YearHigh,YearLow,Beta,PE,Score,Signal';
  const rows = STOCKS.map(s=>[
    s.ticker,`"${s.companyName}"`,s.sector,s.exchange,s.index,
    s.price,s.change.toFixed(2),s.mktCap,
    s.revGrowth??'',s.epsGrowth??'',
    s.volRatio??'',s.volume,s.avgVolume,s.pct52H,s.yearHigh,s.yearLow,
    s.beta??'',s.pe??'',s.score,getSignal(s)
  ].join(','));
  const blob = new Blob([[hdr,...rows].join('\n')],{type:'text/csv'});

// ── DATA EXPLORER (Fundamentals Database)
// ════════════════════════════════════════════════════════════════════════════
let FUNDAMENTALS = [];
let explorerView = 'mktCap';
let explorerSortState = { key: 'mktCap', dir: 'desc' };

const EXPLORER_VIEWS = {
  mktCap:    { title: 'Market Capitalization — Ranked (Desc)', defaultSort: { key: 'mktCap', dir: 'desc' } },
  revGrowth: { title: 'Revenue Growth — Trailing & Forward',   defaultSort: { key: 'revGrowth', dir: 'desc' } },
  pe:        { title: 'P/E & Forward P/E',                     defaultSort: { key: 'pe', dir: 'asc' } },
  all:       { title: 'Full Analysis Table — All Metrics',     defaultSort: { key: 'mktCap', dir: 'desc' } },
};

function fmtNum(v, d=2) { return v==null ? '—' : Number(v).toFixed(d); }
function fmtPct(v) { return v==null ? '—' : (v>0?'+':'')+Number(v).toFixed(1)+'%'; }
function pctClass(v) { return v==null ? '' : v>=0 ? 'pos' : 'neg'; }
function scoreClass(v) { return v==null ? 'sc-lo' : v>=70 ? 'sc-hi' : v>=45 ? 'sc-mid' : 'sc-lo'; }

function resetExplorerSort(view) {
  const cfg = EXPLORER_VIEWS[view] || EXPLORER_VIEWS.mktCap;
  explorerSortState = {
    key: cfg.defaultSort.key,
    dir: cfg.defaultSort.dir,
  };
}

function getExplorerColumns(view) {
  if (view === 'mktCap') {
    return [
      { label: '#', key: '__rank', left: true, sortable: false },
      { label: 'Ticker', key: 'ticker', left: true, type: 'string', defaultDir: 'asc' },
      { label: 'Company', key: 'companyName', left: true, type: 'string', defaultDir: 'asc' },
      { label: 'Sector', key: 'sector', left: true, type: 'string', defaultDir: 'asc' },
      { label: 'Price', key: 'price', type: 'number', defaultDir: 'desc' },
      { label: 'Market Cap', key: 'mktCap', type: 'number', defaultDir: 'desc' },
    ];
  }

  if (view === 'revGrowth') {
    return [
      { label: '#', key: '__rank', left: true, sortable: false },
      { label: 'Ticker', key: 'ticker', left: true, type: 'string', defaultDir: 'asc' },
      { label: 'Company', key: 'companyName', left: true, type: 'string', defaultDir: 'asc' },
      { label: 'Rev Growth (TTM)', key: 'revGrowth', type: 'number', defaultDir: 'desc' },
      { label: 'Fwd Rev Growth', key: 'fwdRevGrowth', type: 'number', defaultDir: 'desc' },
      { label: 'Growth Score', key: 'growthScore', type: 'number', defaultDir: 'desc' },
    ];
  }

  if (view === 'pe') {
    return [
      { label: '#', key: '__rank', left: true, sortable: false },
      { label: 'Ticker', key: 'ticker', left: true, type: 'string', defaultDir: 'asc' },
      { label: 'Company', key: 'companyName', left: true, type: 'string', defaultDir: 'asc' },
      { label: 'Price', key: 'price', type: 'number', defaultDir: 'desc' },
      { label: 'P/E (TTM)', key: 'pe', type: 'number', defaultDir: 'asc' },
      { label: 'Forward P/E', key: 'forwardPE', type: 'number', defaultDir: 'asc' },
    ];
  }

  return [
    { label: '#', key: '__rank', left: true, sortable: false },
    { label: 'Ticker', key: 'ticker', left: true, type: 'string', defaultDir: 'asc' },
    { label: 'Price', key: 'price', type: 'number', defaultDir: 'desc' },
    { label: 'P/E', key: 'pe', type: 'number', defaultDir: 'asc' },
    { label: 'Fwd P/E', key: 'forwardPE', type: 'number', defaultDir: 'asc' },
    { label: 'DCF', key: 'dcf', type: 'number', defaultDir: 'desc' },
    { label: 'Exp Rev Gr', key: 'fwdRevGrowth', type: 'number', defaultDir: 'desc' },
    { label: 'Altman Z', key: 'altman', type: 'number', defaultDir: 'desc' },
    { label: 'Piotroski', key: 'piotroski', type: 'number', defaultDir: 'desc' },
    { label: 'Growth', key: 'growthScore', type: 'number', defaultDir: 'desc' },
    { label: 'Value', key: 'valueScore', type: 'number', defaultDir: 'desc' },
    { label: 'Quality', key: 'qualityScore', type: 'number', defaultDir: 'desc' },
  ];
}

function sortExplorerData(data, columns) {
  const sortable = columns.find(c => c.key === explorerSortState.key && c.sortable !== false);
  if (!sortable) return [...data];

  const dir = explorerSortState.dir === 'asc' ? 1 : -1;

  return [...data].sort((a, b) => {
    const av = a[sortable.key];
    const bv = b[sortable.key];
    const aMissing = av == null || av === '';
    const bMissing = bv == null || bv === '';

    if (aMissing && bMissing) {
      return String(a.ticker || '').localeCompare(String(b.ticker || ''));
    }
    if (aMissing) return 1;
    if (bMissing) return -1;

    let cmp;
    if (sortable.type === 'string') {
      cmp = String(av).localeCompare(String(bv));
    } else {
      cmp = Number(av) - Number(bv);
    }

    if (cmp === 0) {
      cmp = String(a.ticker || '').localeCompare(String(b.ticker || ''));
    }

    return cmp * dir;
  });
}

function toggleExplorerSort(key) {
  const columns = getExplorerColumns(explorerView);
  const clicked = columns.find(c => c.key === key);
  if (!clicked || clicked.sortable === false) return;

  if (explorerSortState.key === key) {
    explorerSortState.dir = explorerSortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    explorerSortState.key = key;
    explorerSortState.dir = clicked.defaultDir || 'desc';
  }

  renderExplorer();
}

async function openExplorer(view) {
  const nextView = view || 'mktCap';
  if (explorerView !== nextView) {
    resetExplorerSort(nextView);
  }
  explorerView = nextView;
  document.getElementById('explorer-overlay').classList.add('open');
  if (FUNDAMENTALS.length === 0) {
    await loadFundamentals(false);
  } else {
    renderExplorer();
  }
}

function closeExplorer() {
  document.getElementById('explorer-overlay').classList.remove('open');
}

function handleExplorerBackdrop(e) {
  if (e.target === document.getElementById('explorer-overlay')) closeExplorer();
}

async function loadFundamentals(forceRefresh) {
  const wrap = document.getElementById('ex-table-wrap');
  wrap.innerHTML = `<div class="msg-box">⟳ ${forceRefresh ? 'Rebuilding' : 'Loading'} fundamentals database… this can take a moment.</div>`;
  document.getElementById('ex-meta').textContent = '';
  try {
    const url = `${getBackendURL()}/api/fundamentals${forceRefresh ? '?refresh=1' : ''}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Server returned HTTP ${res.status}`);
    const payload = await res.json();
    if (payload.error) throw new Error(payload.error);
    FUNDAMENTALS = Array.isArray(payload.stocks) ? payload.stocks : [];
    document.getElementById('ex-meta').textContent =
      `${FUNDAMENTALS.length} stocks · Updated ${payload.lastUpdated || '—'} · Saved to data/fundamentals.json`;
    renderExplorer();

    wrap.innerHTML = `<div class="msg-box error">⚠ ${err.message}<br><span style="font-size:9px;color:var(--muted)">Ensure the backend is running, then click REBUILD DB.</span></div>`;

// ── FILTER HISTORY (PostgreSQL-backed)
// ════════════════════════════════════════════════════════════════════════════

let historyRunsCache = [];
let historyRunSortState = { key: 'created_at', dir: 'desc' };
let activeHistoryRun = null;
let historyResultSortState = { key: 'score', dir: 'desc' };

function getHistoryRunColumns() {
  return [
    { label: '#', key: 'id', left: true, type: 'number', defaultDir: 'desc' },
    { label: 'Label', key: 'label', left: true, type: 'string', defaultDir: 'asc' },
    { label: 'Stocks', key: 'result_count', type: 'number', defaultDir: 'desc' },
    { label: 'Saved', key: 'created_at', left: true, type: 'date', defaultDir: 'desc' },
    { label: 'Actions', key: '__actions', left: true, sortable: false },
  ];
}

function sortHistoryRows(rows, columns, sortState) {
  const col = columns.find(c => c.key === sortState.key && c.sortable !== false);
  if (!col) return [...rows];
  const dir = sortState.dir === 'asc' ? 1 : -1;

  return [...rows].sort((a, b) => {
    const av = a[col.key];
    const bv = b[col.key];
    const aMissing = av == null || av === '';
    const bMissing = bv == null || bv === '';

    if (aMissing && bMissing) return 0;
    if (aMissing) return 1;
    if (bMissing) return -1;

    let cmp = 0;
    if (col.type === 'string') {
      cmp = String(av).localeCompare(String(bv));
    } else if (col.type === 'date') {
      cmp = new Date(av).getTime() - new Date(bv).getTime();
    } else {
      cmp = Number(av) - Number(bv);
    }

    if (cmp === 0 && col.key !== 'id') {
      cmp = Number(a.id || 0) - Number(b.id || 0);
    }

    return cmp * dir;
  });
}

function toggleHistorySort(key) {
  const columns = getHistoryRunColumns();
  const col = columns.find(c => c.key === key);
  if (!col || col.sortable === false) return;

  if (historyRunSortState.key === key) {
    historyRunSortState.dir = historyRunSortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    historyRunSortState.key = key;
    historyRunSortState.dir = col.defaultDir || 'desc';
  }

  renderHistoryRunsTable();
}

function renderHistoryRunsTable() {
  const wrap = document.getElementById('hist-table-wrap');
  const columns = getHistoryRunColumns();
  const runs = sortHistoryRows(historyRunsCache, columns, historyRunSortState);
  const thead = '<tr>' + columns.map(c => {
    const left = c.left ? 'left' : '';
    const sortable = c.sortable === false ? '' : 'sortable';
    const sorted = c.key === historyRunSortState.key ? 'sorted' : '';
    const arrow = c.key === historyRunSortState.key ? (historyRunSortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
    const click = c.sortable === false ? '' : `onclick="toggleHistorySort('${c.key}')"`;
    return `<th class="${left} ${sortable} ${sorted}" ${click}>${c.label}${arrow}</th>`;
  }).join('') + '</tr>';

  const tbody = runs.map(r => {
    const dt = new Date(r.created_at).toLocaleString();
    return `<tr>
      <td class="left rank">${r.id}</td>
      <td class="left">${(r.label||'—').replace(/</g,'&lt;')}</td>
      <td>${r.result_count ?? '—'}</td>
      <td class="left">${dt}</td>
      <td class="left"><span class="row-link" onclick="viewRun('${r.id}')">view</span> · <span class="row-link" onclick="exportRunCSV('${r.id}')">csv</span></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table class="ex-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

function getHistoryResultColumns() {
  return [
    { label: 'Ticker', key: 'ticker', left: true, type: 'string', defaultDir: 'asc' },
    { label: 'Sector', key: 'sector', left: true, type: 'string', defaultDir: 'asc' },
    { label: 'Price', key: 'price', type: 'number', defaultDir: 'desc' },
    { label: 'Chg %', key: 'change', type: 'number', defaultDir: 'desc' },
    { label: 'Rev Gr', key: 'revGrowth', type: 'number', defaultDir: 'desc' },
    { label: 'Vol×', key: 'volRatio', type: 'number', defaultDir: 'desc' },
    { label: '52W%', key: 'pct52H', type: 'number', defaultDir: 'desc' },
    { label: 'Beta', key: 'beta', type: 'number', defaultDir: 'desc' },
    { label: 'P/E', key: 'pe', type: 'number', defaultDir: 'asc' },
    { label: 'Score', key: 'score', type: 'number', defaultDir: 'desc' },
    { label: 'Signal', key: 'signal', left: true, type: 'string', defaultDir: 'asc' },
  ];
}

function getSortedHistoryRunResults(run, useActiveSort = false) {
  const rows = Array.isArray(run?.results) ? run.results : [];
  if (!rows.length) return [];
  const columns = getHistoryResultColumns();
  const sortState = useActiveSort
    ? historyResultSortState
    : { key: 'score', dir: 'desc' };
  return sortHistoryRows(rows, columns, sortState);
}

function toggleHistoryResultSort(key) {
  if (!activeHistoryRun) return;
  const columns = getHistoryResultColumns();
  const col = columns.find(c => c.key === key);
  if (!col || col.sortable === false) return;

  if (historyResultSortState.key === key) {
    historyResultSortState.dir = historyResultSortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    historyResultSortState.key = key;
    historyResultSortState.dir = col.defaultDir || 'desc';
  }

  renderHistoryRunTable(activeHistoryRun);
}

function renderHistoryRunTable(run) {
  const wrap = document.getElementById('hist-table-wrap');
  const rows = Array.isArray(run.results) ? run.results : [];
  document.getElementById('hist-meta').innerHTML =
    `Run #${run.id} · <strong>${(run.label||'—')}</strong> · ${rows.length} stocks · ${new Date(run.created_at).toLocaleString()} · <span class="row-link" onclick="loadHistory()">← back to list</span>`;

  if (!rows.length) {
    wrap.innerHTML = '<div class="msg-box">This run has no stored results.</div>';
    return;
  }

  const columns = getHistoryResultColumns();
  const sortedRows = getSortedHistoryRunResults(run, true);
  const thead = '<tr>' + columns.map(c => {
    const left = c.left ? 'left' : '';
    const sorted = c.key === historyResultSortState.key ? 'sorted' : '';
    const arrow = c.key === historyResultSortState.key ? (historyResultSortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<th class="${left} sortable ${sorted}" onclick="toggleHistoryResultSort('${c.key}')">${c.label}${arrow}</th>`;
  }).join('') + '</tr>';

  const tbody = sortedRows.map(s=>`<tr>
    <td class="left tk">${s.ticker}</td><td class="left">${s.sector||'—'}</td>
    <td>$${fmtNum(s.price)}</td>
    <td class="${s.change>=0?'pos':'neg'}">${s.change!=null?(s.change>=0?'+':'')+Number(s.change).toFixed(2)+'%':'—'}</td>
    <td class="${pctClass(s.revGrowth)}">${s.revGrowth!=null?(s.revGrowth>0?'+':'')+s.revGrowth+'%':'—'}</td>
    <td>${s.volRatio!=null?Number(s.volRatio).toFixed(1)+'×':'—'}</td>
    <td>${s.pct52H ?? '—'}%</td><td>${s.beta ?? '—'}</td><td>${s.pe ?? '—'}</td>
    <td><span class="score-cell ${scoreClass(s.score)}">${s.score ?? '—'}</span></td>
    <td class="left">${s.signal || '—'}</td>
  </tr>`).join('');

  wrap.innerHTML = `<table class="ex-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

// Capture the criteria + standard filters currently applied, for saving.
function currentCriteriaSnapshot() {
  const snap = {
    index:  document.getElementById('filter-index').value,
    signal: document.getElementById('filter-signal').value,
    sector: document.getElementById('filter-sector').value,
    minScore: parseInt(document.getElementById('filter-score').value),
    sortBy: document.getElementById('sort-by').value,
    thresholds: {}
  };
  for (const key of Object.keys(CRITERIA_DEFAULTS)) {
    if (isCriteriaActive(key)) snap.thresholds[key] = { ...criteriaThresholds[key] };
  }
  return snap;
}

// Recompute the currently-filtered dataset (same logic as applyFilters).
function currentFilteredData() {
  const idx   = document.getElementById('filter-index').value;
  const sig   = document.getElementById('filter-signal').value;
  const sec   = document.getElementById('filter-sector').value;
  const minSc = parseInt(document.getElementById('filter-score').value);
  const sort  = document.getElementById('sort-by').value;
  const criteriaFilters = Object.keys(CRITERIA_DEFAULTS)
    .filter(key => isCriteriaActive(key))
    .map(key => ({ key, min: criteriaThresholds[key].min, max: criteriaThresholds[key].max }));

  let data = STOCKS.filter(s => {
    const signal = getSignal(s);
    const secMatch = sec==='ALL' || (s.sector||'').toLowerCase().includes(sec.toLowerCase());
    if (!(idx==='ALL' || s.index===idx)) return false;
    if (!(sig==='ALL' || signal===sig))  return false;
    if (!secMatch)                        return false;
    if (s.score < minSc)                  return false;
    for (const f of criteriaFilters) {
      const val = s[f.key];
      if (val == null) { if (f.min > 0) return false; continue; }
      if (val < f.min || val > f.max) return false;
    }
    return true;
  });
  data.sort((a,b) => {
    if (sort==='score')     return b.score - a.score;
    if (sort==='volRatio')  return (b.volRatio||0) - (a.volRatio||0);
    if (sort==='change')    return b.change - a.change;
    if (sort==='revGrowth') return (b.revGrowth||0) - (a.revGrowth||0);
    return 0;
  });
  return data;
}

async function saveCurrentRun() {
  if (!STOCKS.length) { alert('No data loaded. Click REFRESH SCREEN first.'); return; }
  const data = currentFilteredData();
  if (!data.length) { alert('No stocks match the current filters — nothing to save.'); return; }
  const label = prompt(`Label this filter run (${data.length} stocks):`, `Run ${new Date().toLocaleString()}`);
  if (label === null) return; // cancelled

  // Trim each result to the fields worth analysing later.
  const results = data.map(s => ({
    ticker: s.ticker, companyName: s.companyName, sector: s.sector, index: s.index,
    price: s.price, change: s.change, mktCap: s.mktCap, revGrowth: s.revGrowth,
    epsGrowth: s.epsGrowth, volRatio: s.volRatio, pct52H: s.pct52H, beta: s.beta,
    pe: s.pe, score: s.score, signal: getSignal(s)
  }));

  try {
    const res = await fetch(`${getBackendURL()}/api/filter-runs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label, criteria: currentCriteriaSnapshot(), results })
    });
    if (res.status === 503) { alert('History database not configured on the server.'); return; }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const j = await res.json();
    alert(`✓ Saved filter run #${j.id} (${results.length} stocks). View it under Data Explorer → Filter History.`);
  } catch (err) {
    alert(`⚠ Could not save run: ${err.message}`);
  }
}

  document.getElementById('hist-meta').textContent = '';
  try {
    const res = await fetch(`${getBackendURL()}/api/filter-runs?limit=100`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const j = await res.json();
    if (!j.dbEnabled) {
      wrap.innerHTML = '<div class="msg-box">History database is not configured on the server. Set DATABASE_URL in Railway to enable saved runs.</div>';
      return;
    }
    const runs = j.runs || [];
    historyRunsCache = runs;
    document.getElementById('hist-meta').textContent =
      `${runs.length} saved run(s) · auto-deleted after ${j.retentionDays} days`;
    if (!runs.length) {
      wrap.innerHTML = '<div class="msg-box">No saved runs yet. Apply filters, then click 💾 SAVE RUN.</div>';
      return;
    }
    renderHistoryRunsTable();
  } catch (err) {
    wrap.innerHTML = `<div class="msg-box error">⚠ ${err.message}</div>`;
  }
}

async function fetchRun(id) {
  const res = await fetch(`${getBackendURL()}/api/filter-runs/${id}`);
