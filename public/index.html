async function exportRunCSV(id) {
  try {
    const run = await fetchRun(id);
    const useActiveSort = !!(activeHistoryRun && String(activeHistoryRun.id) === String(run.id));
    const rows = getSortedHistoryRunResults(run, useActiveSort);
    if (!rows.length) { alert('This run has no stored results.'); return; }
    const hdr = 'Ticker,Company,Sector,Index,Price,Change%,MarketCap,RevGrowth%,EpsGrowth%,VolRatio,52WHigh%,Beta,PE,Score,Signal';
    const csv = rows.map(s=>[
      s.ticker,`"${(s.companyName||'').replace(/"/g,'""')}"`,s.sector,s.index,
      s.price??'',s.change??'',s.mktCap??'',s.revGrowth??'',s.epsGrowth??'',
      s.volRatio??'',s.pct52H??'',s.beta??'',s.pe??'',s.score??'',s.signal||''
    ].join(','));
    const blob = new Blob([[hdr,...csv].join('\n')],{type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `apex-run-${id}-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  } catch (err) {
    alert(`⚠ Export failed: ${err.message}`);
  }
}

// ════════════════════════════════════════════════════════════════════════════
// ── MARKET-HOURS SCHEDULER
//    Refreshes automatically only during two windows on US trading days:
//      • Morning  : 9:32 AM – 10:00 AM ET
//      • Afternoon: 3:55 PM –  3:59 PM ET
//    Weekends and US stock-market holidays are skipped entirely.
//    All other refreshes come from manual user actions.
// ════════════════════════════════════════════════════════════════════════════

// ── Good Friday dates (Easter-based; hardcoded through 2035) ─────────────
const GOOD_FRIDAY_DATES = [
  '2024-03-29', '2025-04-18', '2026-04-03', '2027-03-26', '2028-04-14',
  '2029-03-30', '2030-04-19', '2031-04-11', '2032-03-26', '2033-04-15',
  '2034-03-31', '2035-04-20',
];

// ── Fixed US stock-market holidays (MM-DD) ───────────────────────────────
// New Year's Day, MLK Day*, Presidents Day*, Memorial Day*, Juneteenth,
// Independence Day, Labor Day*, Thanksgiving*, Christmas
// (* = floating — approximated by the most common observed date;
//    the scheduler recalculates the exact Monday/Friday for each year.)
function getUSMarketHolidays(year) {
  const holidays = new Set();

  function addDate(d) {
    holidays.add(d.toISOString().slice(0, 10));
  }

  // Helper: nth weekday of a month (e.g. 3rd Monday of January)
  function nthWeekday(y, month, weekday, n) {
    // month: 0-based; weekday: 0=Sun … 6=Sat
    let d = new Date(y, month, 1);
    let count = 0;
    while (true) {
      if (d.getDay() === weekday) { count++; if (count === n) return new Date(d); }
      d.setDate(d.getDate() + 1);
    }
  }

  // Helper: last weekday of a month
  function lastWeekday(y, month, weekday) {
    let d = new Date(y, month + 1, 0); // last day of month
    while (d.getDay() !== weekday) d.setDate(d.getDate() - 1);
    return new Date(d);
  }

  // Helper: observed date (if holiday falls on Sat → Fri; Sun → Mon)
  function observed(d) {
    const day = d.getDay();
    if (day === 6) { const o = new Date(d); o.setDate(d.getDate() - 1); return o; }
    if (day === 0) { const o = new Date(d); o.setDate(d.getDate() + 1); return o; }
    return d;
  }

  // New Year's Day — Jan 1 (observed)
  addDate(observed(new Date(year, 0, 1)));

  // MLK Day — 3rd Monday of January
  addDate(nthWeekday(year, 0, 1, 3));

  // Presidents Day — 3rd Monday of February
  addDate(nthWeekday(year, 1, 1, 3));

  // Good Friday — from hardcoded list
  GOOD_FRIDAY_DATES.forEach(s => {
    if (s.startsWith(String(year))) holidays.add(s);
  });

  // Memorial Day — last Monday of May
  addDate(lastWeekday(year, 4, 1));

  // Juneteenth — Jun 19 (observed)
  addDate(observed(new Date(year, 5, 19)));

  // Independence Day — Jul 4 (observed)
  addDate(observed(new Date(year, 6, 4)));

  // Labor Day — 1st Monday of September
  addDate(nthWeekday(year, 8, 1, 1));

  // Thanksgiving — 4th Thursday of November
  addDate(nthWeekday(year, 10, 4, 4));

  // Christmas — Dec 25 (observed)
  addDate(observed(new Date(year, 11, 25)));

  return holidays;
}

function isUSMarketHoliday(date) {
  const key = date.toISOString().slice(0, 10);
  return getUSMarketHolidays(date.getFullYear()).has(key);
}

function isUSMarketTradingDay(date) {
  const dow = date.getDay(); // 0=Sun, 6=Sat
  if (dow === 0 || dow === 6) return false;
  return !isUSMarketHoliday(date);
}

// ── Convert a local Date to ET wall-clock hours/minutes ──────────────────
// We use Intl.DateTimeFormat to get the true ET time regardless of the
// user's local timezone, so the schedule is always correct.
function getETTime(date) {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false,
  }).formatToParts(date);
  const get = type => parseInt(parts.find(p => p.type === type).value, 10);
  return { h: get('hour'), m: get('minute'), s: get('second') };
}

// ── Get a Date object representing a specific ET time on a given ET date ──
function etTimeToDate(etDateStr, h, m, s = 0) {
  // etDateStr: 'YYYY-MM-DD' in ET; we build an ISO string and let the
  // browser parse it as UTC, then adjust for ET offset.
  // Simpler: use a trick — create the date in ET via Intl.
  // We'll use the offset approach: find the UTC ms for that ET wall time.
  const approx = new Date(`${etDateStr}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}-05:00`);
  // That gives EST; check if it should be EDT (UTC-4) by comparing
  // what ET the browser reports for that moment.
  const et = getETTime(approx);
  const diffH = et.h - h, diffM = et.m - m;
  if (diffH !== 0 || diffM !== 0) {
    // We're in EDT (UTC-4), not EST (UTC-5) — shift by 1 hour
    return new Date(approx.getTime() - 60 * 60 * 1000);
  }
  return approx;
}

// ── Refresh windows (ET): [startH, startM, endH, endM] ──────────────────
const REFRESH_WINDOWS = [
  { startH: 9,  startM: 32, endH: 10, endM: 0  },
  { startH: 15, startM: 55, endH: 15, endM: 59 },
];

function isInMarketHours(date) {
  if (!isUSMarketTradingDay(date)) return false;
  const { h, m } = getETTime(date);
  const totalMin = h * 60 + m;
  return REFRESH_WINDOWS.some(w => {
    const start = w.startH * 60 + w.startM;
    const end   = w.endH   * 60 + w.endM;
    return totalMin >= start && totalMin <= end;
  });
}

// ── Scheduler state ───────────────────────────────────────────────────────
let _marketRefreshTimer   = null;  // setTimeout handle for next window start
let _marketWindowTimer    = null;  // setInterval handle for within-window ticks
let _nextRefreshLabelTimer = null; // setInterval handle for label countdown

function updateNextRefreshLabel(nextDate) {
  const el = document.getElementById('next-refresh-text');
  if (!el) return;

  function tick() {
    const now  = new Date();
    const diff = nextDate - now;
    if (diff <= 0) { el.innerHTML = ''; return; }
    const totalSec = Math.floor(diff / 1000);
    const hh = Math.floor(totalSec / 3600);
    const mm = Math.floor((totalSec % 3600) / 60);
    const ss = totalSec % 60;
    const pad = n => String(n).padStart(2, '0');
    const countdown = hh > 0
      ? `${hh}h ${pad(mm)}m ${pad(ss)}s`
      : mm > 0 ? `${pad(mm)}m ${pad(ss)}s` : `${pad(ss)}s`;
    const { h, m } = getETTime(nextDate);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12  = h % 12 || 12;
    const label = `${h12}:${String(m).padStart(2,'0')} ${ampm} ET`;
    el.innerHTML = `⏱ Next auto-refresh: <strong style="color:var(--accent)">${label}</strong> <span style="color:var(--muted)">(${countdown})</span>`;
  }

  if (_nextRefreshLabelTimer) clearInterval(_nextRefreshLabelTimer);
  tick();
  _nextRefreshLabelTimer = setInterval(tick, 1000);
}

function clearNextRefreshLabel() {
  const el = document.getElementById('next-refresh-text');
  if (el) el.innerHTML = '';
  if (_nextRefreshLabelTimer) { clearInterval(_nextRefreshLabelTimer); _nextRefreshLabelTimer = null; }
}

// ── Find the next ET date string (YYYY-MM-DD) that is a trading day ───────
function nextTradingDateStr(fromDate) {
  const d = new Date(fromDate);
  for (let i = 0; i < 10; i++) {
    d.setDate(d.getDate() + 1);
    if (isUSMarketTradingDay(d)) {
      // Return the ET date string for that day
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        year: 'numeric', month: '2-digit', day: '2-digit',
      }).format(d).replace(/(\d+)\/(\d+)\/(\d+)/, '$3-$1-$2');
    }
  }
  return null;
}

// ── Get the ET date string for "today" ────────────────────────────────────
function todayETStr() {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    year: 'numeric', month: '2-digit', day: '2-digit',
  }).format(new Date()).replace(/(\d+)\/(\d+)\/(\d+)/, '$3-$1-$2');
}

// ── Main scheduler entry point ────────────────────────────────────────────
function scheduleMarketRefresh() {
  // Clear any existing timers
  if (_marketRefreshTimer)  { clearTimeout(_marketRefreshTimer);   _marketRefreshTimer  = null; }
  if (_marketWindowTimer)   { clearInterval(_marketWindowTimer);   _marketWindowTimer   = null; }

  const now    = new Date();
  const etNow  = getETTime(now);
  const todayStr = todayETStr();
  const todayIsTrading = isUSMarketTradingDay(now);

  // Check if we are currently inside a refresh window right now
  if (todayIsTrading) {
    const totalMin = etNow.h * 60 + etNow.m;
    for (const w of REFRESH_WINDOWS) {
      const start = w.startH * 60 + w.startM;
      const end   = w.endH   * 60 + w.endM;
      if (totalMin >= start && totalMin <= end) {
        // We're live inside a window — fire immediately, then tick every 60s
        // until the window closes, then schedule the next window.
        console.log('[Apex] Inside market refresh window — triggering now.');
        clearNextRefreshLabel();
        if (STOCKS.length > 0) loadAllData();
        const windowEndDate = etTimeToDate(todayStr, w.endH, w.endM, 59);
        _marketWindowTimer = setInterval(() => {
          if (new Date() > windowEndDate) {
            clearInterval(_marketWindowTimer);
            _marketWindowTimer = null;
            scheduleMarketRefresh(); // find next window
            return;
          }
          if (STOCKS.length > 0) loadAllData();
        }, 60 * 1000);
        return;
      }
    }
  }

  // Not currently in a window — find the next one
  // Check remaining windows today (if today is a trading day)
  let nextWindowDate = null;

  if (todayIsTrading) {
    const totalMin = etNow.h * 60 + etNow.m;
    for (const w of REFRESH_WINDOWS) {
      const start = w.startH * 60 + w.startM;
      if (totalMin < start) {
        nextWindowDate = etTimeToDate(todayStr, w.startH, w.startM);
        break;
      }
    }
  }

  // If no window left today, look at the next trading day's first window
  if (!nextWindowDate) {
    const nextDayStr = nextTradingDateStr(now);
    if (nextDayStr) {
      const w = REFRESH_WINDOWS[0];
      nextWindowDate = etTimeToDate(nextDayStr, w.startH, w.startM);
    }
  }

  if (!nextWindowDate) {
    console.warn('[Apex] Could not find next trading day within 10 days — scheduler paused.');
    clearNextRefreshLabel();
    return;
  }

  const msUntil = nextWindowDate - now;
  console.log(`[Apex] Next market refresh scheduled in ${Math.round(msUntil/60000)} min at`, nextWindowDate.toLocaleString());
  updateNextRefreshLabel(nextWindowDate);

  _marketRefreshTimer = setTimeout(() => {
    _marketRefreshTimer = null;
    scheduleMarketRefresh(); // re-enter — will now detect we're inside the window
  }, msUntil);
}

// Kick off the scheduler on page load.
// NOTE: loadAllData() is called after successful login, not on boot.
scheduleMarketRefresh();

// ── Shared helpers ───────────────────────────────────────────────────────────

/** Escape HTML special characters to prevent XSS. */
function _esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── HOUSING SEARCH ───────────────────────────────────────────────────────────

/** Conversation history for the housing chat session. */
let HOUSING_MESSAGES = [];

/**
 * Open the Housing Search section, scroll to it, and probe status.
 */
function openHousingSearch() {
  const sec = document.getElementById('housing-section');
  const dd  = document.getElementById('main-menu-dropdown');
  if (dd) dd.classList.remove('open');
  if (sec) {
    sec.style.display = 'block';
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  checkHousingStatus();
}

/** Close the Housing Search section. */
function closeHousingSearch() {
  const sec = document.getElementById('housing-section');
  if (sec) sec.style.display = 'none';
}

/**
 * Probe /api/housing-chat/status and update the badge area.
 */
async function checkHousingStatus() {
  try {
    const base = getBackendURL();
    const res  = await fetch(`${base}/api/housing-chat/status`);
    if (!res.ok) return;
    const data = await res.json();
    const statusEl = document.getElementById('housing-status');
    const mcpBadge = document.getElementById('housing-mcp-badge');
    if (statusEl) {
      statusEl.textContent = data.geminiConfigured ? '● Gemini AI ready' : '● Gemini not configured';
      statusEl.style.color = data.geminiConfigured ? '#4ade80' : 'var(--red)';
    }
    if (mcpBadge) mcpBadge.style.display = data.mcpConfigured ? 'inline' : 'none';
  } catch (_) { /* silently ignore */ }
}

/**
 * Auto-resize the textarea as the user types.
 */
function housingInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.querySelector('.housing-input-row').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
  }
}

/**
 * Append a message bubble to the chat UI.
 * @param {'user'|'assistant'|'error'} role
 * @param {string} content
 * @param {boolean} [mcpUsed]
 */
function appendHousingMessage(role, content, mcpUsed) {
  const container = document.getElementById('housing-messages');
  if (!container) return;

  const wrap = document.createElement('div');
  wrap.className = `hchat-msg hchat-${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'hchat-bubble';
  // Convert newlines to <br> and escape HTML
  bubble.innerHTML = _esc(content).replace(/\n/g, '<br>');

  const meta = document.createElement('div');
  meta.className = 'hchat-meta';
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  meta.textContent = now + (mcpUsed ? ' · MLS data' : '');

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

/**
 * Send the user's message to /api/housing-chat and display the response.
 * @param {Event} e
 */
async function sendHousingMessage(e) {
  e.preventDefault();

  const inputEl  = document.getElementById('housing-input');
  const sendBtn  = document.getElementById('housing-send-btn');
  const typingEl = document.getElementById('housing-typing');
  const text     = (inputEl?.value || '').trim();

  if (!text) return;

  // Show user message
  appendHousingMessage('user', text);
  HOUSING_MESSAGES.push({ role: 'user', content: text });
  inputEl.value = '';
  inputEl.style.height = '';

  // Show typing indicator
  if (typingEl) typingEl.style.display = 'flex';
  if (sendBtn)  sendBtn.disabled = true;

  try {
    const base = getBackendURL();
    const res  = await fetch(`${base}/api/housing-chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ messages: HOUSING_MESSAGES }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }

    const reply = data.reply || '(No reply)';
    HOUSING_MESSAGES.push({ role: 'assistant', content: reply });
    appendHousingMessage('assistant', reply, data.mcpUsed);
  } catch (err) {
    appendHousingMessage('error', '⚠ ' + err.message);
  } finally {
    if (typingEl) typingEl.style.display = 'none';
    if (sendBtn)  sendBtn.disabled = false;
    inputEl?.focus();
  }
}
